[phases.setup]
nixPkgs = ["python312", "chromium", "nss", "nspr", "atk", "cups", "dbus", "libdrm", "gtk3", "pango", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "mesa", "alsa-lib"]

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
